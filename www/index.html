<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-touch-fullscreen" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="个人所得税" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="个人所得税" />
  <meta name="format-detection" content="telephone=no" />
  <meta name="theme-color" content="#2f86ff" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <!-- iOS 启动图（Splash Screen） -->
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-startup-image" href="assets/app-icon-512.png" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="assets/app-icon-192.png" type="image/png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <!-- iOS 独立模式检测：JS 会添加 .ios-standalone 类 -->
  <script>
    (function() {
      if (window.navigator.standalone) document.documentElement.classList.add('ios-standalone');
      // iOS 设备检测（用于 CSS 钩子）
      if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
        document.documentElement.classList.add('ios-device');
      }
    })();
  </script>
  <title>个人所得税 App</title>
  <style>
    :root {
      --blue: #2f86ff;
      --deep-blue: #1f78f2;
      --page: #f5f7fb;
      --ink: #232832;
      --muted: #9ca3af;
      --line: #edf0f5;
      --white: #fff;
      --warn-bg: #fff7e8;
      --warn: #a56a1d;
      --app-w: 440px;
      --real-vh: 100dvh;
      --safe-top: max(env(safe-area-inset-top, 0px), 20px);
      --safe-bottom: max(env(safe-area-inset-bottom, 0px), 0px);
      --nav-h: 70px;
      --nav-gap: 10px;
      --nav-bottom: max(12px, calc(var(--safe-bottom) + 0px));
      --home-bottom-space: calc(var(--nav-h) + var(--nav-bottom) + 30px);
      --font: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--page);
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--page);
      font-family: var(--font);
      color: var(--ink);
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
      transition: transform .16s ease, opacity .16s ease, filter .16s ease;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(.98);
    }

    .app-stage {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: var(--real-vh, 100dvh);
      background: var(--page);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .app {
      width: min(var(--app-w), 100vw);
      height: 100%;
      height: var(--real-vh, 100dvh);
      overflow: hidden;
      position: relative;
      background: var(--page);
      box-shadow: 0 20px 70px rgba(27, 47, 83, .16);
      transform: translateZ(0);
    }

    /* 移动端 + standalone 模式：全屏无边框 */
    @media (max-width: 520px), (display-mode: standalone) {
      .app-stage {
        display: block;
      }
      .app {
        width: 100vw;
        height: 100%;
        max-width: none;
        max-height: none;
        box-shadow: none;
        border-radius: 0;
      }
    }

    /* iOS Safari 额外适配 */
    @supports (-webkit-touch-callout: none) {
      .app-stage,
      .app {
        height: var(--real-vh, 100dvh);
      }
    }

    /* ===== Standalone / 全屏模式 notch & 灵动岛适配 ===== */
    /* 策略：各 screen 自己管理顶部安全区，让状态栏背景与内容无缝融合 */

    /* 移除 app-stage 的全局 padding，交给各 screen */
    .ios-standalone .app-stage {
      padding-top: 0;
    }

    /* 首页：蓝色背景无缝延伸到状态栏/灵动岛区域 */
    .ios-standalone #home {
      padding-top: env(safe-area-inset-top, 0px);
      background: #3488f5;
    }
    .ios-standalone #home .home-top {
      padding-top: 28px;
    }
    /* 非 standalone 模式：用 --safe-top 保持合理的间距 */
    #home .home-top {
      padding-top: calc(28px + var(--safe-top));
    }

    /* 启动屏：白色背景延伸到状态栏 */
    .ios-standalone #splash {
      padding-top: env(safe-area-inset-top, 0px);
      background: #fff;
      background-image: url("assets/splash-reference.png");
      background-size: cover;
      background-position: center top;
    }

    /* 子页面 header：白色背景无缝延伸到状态栏 */
    .ios-standalone .sub-header {
      padding-top: env(safe-area-inset-top, 0px);
      min-height: calc(61px + env(safe-area-inset-top, 0px));
    }

    /* iOS 键盘打开时自动调整布局（通过 JS 添加类） */
    .keyboard-visible .app {
      height: 100% !important;
    }
    .keyboard-visible .screen.active {
      bottom: 0;
    }
    .keyboard-visible .bottom-nav {
      display: none !important;
    }

    /* iOS 独立模式：底部导航额外安全区（原有代码已用 --safe-bottom 处理，此规则仅增强独立模式） */
    .ios-standalone .bottom-nav {
      height: calc(var(--nav-h) + env(safe-area-inset-bottom, 0px) + 4px);
    }

    /* ===== Standalone 适配结束 ===== */

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: var(--white);
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translate3d(0, 10px, 0) scale(.992);
      transition:
        opacity .28s ease,
        transform .32s cubic-bezier(.2, .8, .2, 1),
        visibility 0s linear .32s;
      z-index: 0;
    }

    .screen.active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translate3d(0, 0, 0) scale(1);
      transition-delay: 0s;
      z-index: 3;
    }

    .app.instant-switch .screen {
      transition: none !important;
    }

    .screen.scroll {
      display: block;
    }

    .scroll {
      overflow-y: auto;
      scrollbar-width: none;
      overscroll-behavior: contain;
    }

    .scroll::-webkit-scrollbar {
      display: none;
    }

    .launcher {
      background: #020916;
      justify-content: center;
      align-items: center;
    }

    .launcher-icon {
      width: 100%;
      height: auto;
      aspect-ratio: 1;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .launcher-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .launcher-name {
      display: none;
    }

    .splash {
      background: #fff url("assets/splash-reference.png") center top / cover no-repeat;
      justify-content: center;
      align-items: center;
    }

    .splash.retired {
      display: none;
    }

    .home {
      background: var(--page);
      padding-bottom: var(--home-bottom-space);
      isolation: isolate;
    }

    .home::after {
      content: "";
      display: none;
      position: fixed;
      left: 50%;
      width: min(100vw, var(--app-w));
      transform: translateX(-50%);
      bottom: 0;
      height: calc(var(--nav-h) + var(--nav-bottom) + 26px);
      background: linear-gradient(180deg, rgba(245, 247, 251, 0), rgba(245, 247, 251, .9) 28%, var(--page));
      pointer-events: none;
      z-index: 40;
    }

    .home-top {
      background: linear-gradient(180deg, #3488f5 0%, #4c98ff 48%, rgba(245, 247, 251, 0) 100%);
      padding: calc(28px + var(--safe-top)) 16px 26px;
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 42px;
      gap: 12px;
      align-items: center;
    }

    .search-box {
      height: 48px;
      border-radius: 16px;
      background: rgba(255, 255, 255, .30);
      color: rgba(255, 255, 255, .96);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      font-size: 18px;
      font-weight: 430;
      white-space: nowrap;
      overflow: hidden;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .26);
      transition: background .2s ease;
    }

    .search-box:active {
      background: rgba(255, 255, 255, .22);
    }

    .magnify {
      width: 22px;
      height: 22px;
      border: 2.5px solid currentColor;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }

    .magnify::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 2.5px;
      right: -8px;
      bottom: -2px;
      background: currentColor;
      transform: rotate(45deg);
      border-radius: 2px;
    }

    .scan {
      width: 42px;
      height: 44px;
      position: relative;
      background: url("assets/top-scan-reference.png") center / 31px auto no-repeat;
      filter: drop-shadow(0 1px 1px rgba(38, 81, 150, .18));
    }

    .scan::before {
      content: none;
    }

    .notice {
      height: 52px;
      margin-top: 20px;
      border-radius: 12px;
      background: linear-gradient(90deg, #fff8ea 0%, #fff4dc 100%);
      display: flex;
      align-items: center;
      color: var(--warn);
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(244, 192, 108, .16);
    }

    .notice-icon {
      position: relative;
      width: 52px;
      height: 100%;
      display: grid;
      place-items: center;
      color: #f0832f;
      font-size: 0;
      background-color: rgba(255, 248, 229, .96);
      background-image: url("assets/top-bell-reference.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: 35px 35px;
      flex: 0 0 auto;
      font-weight: 800;
    }

    .notice-icon::before {
      content: none;
    }

    .notice-icon::after {
      content: none;
    }

    .notice-text {
      font-size: 17px;
      font-weight: 430;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 14px;
      min-width: 0;
    }

    .image-card {
      position: relative;
      overflow: hidden;
      background-size: cover;
      background-position: center;
      box-shadow: 0 12px 28px rgba(55, 119, 205, .08);
      transform: translateZ(0);
      transition: transform .24s ease, box-shadow .24s ease, filter .24s ease;
    }

    .image-card:active {
      transform: scale(.992);
      filter: brightness(.985);
    }

    .image-card > button {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .hero-card {
      margin-top: 16px;
      border-radius: 12px;
      aspect-ratio: 1296 / 682;
      background-image: url("assets/hero-card.jpg");
      box-shadow: 0 13px 28px rgba(55, 119, 205, .11);
    }

    .section {
      padding: 30px 16px 0;
    }

    .section-title {
      font-size: 21px;
      font-weight: 850;
      line-height: 1;
      margin-bottom: 22px;
    }

    .deduct-card {
      border-radius: 12px;
      aspect-ratio: 1320 / 588;
      background-image: url("assets/deduct-card.jpg");
      box-shadow: 0 12px 26px rgba(43, 121, 224, .12);
    }

    .services-image {
      margin-top: 20px;
      margin-bottom: 28px;
      height: 174px;
      border-radius: 10px;
      background: url("assets/services-strip.jpg") left center / auto 100% no-repeat;
      overflow-x: auto;
      scrollbar-width: none;
      position: relative;
      scroll-snap-type: x proximity;
      overscroll-behavior-x: contain;
    }

    .services-image::-webkit-scrollbar {
      display: none;
    }

    .service-hotspot {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 126px;
      width: 128px;
      border-radius: 10px;
    }

    .pension-banner {
      height: 106px;
      margin: 0 16px 24px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
      background: url("assets/pension-banner-complete.png") center / cover no-repeat;
      box-shadow: 0 10px 22px rgba(214, 112, 36, .10);
    }

    .pension-copy,
    .pension-phone,
    .pension-person {
      display: none;
    }

    .info-tabs {
      display: flex;
      align-items: center;
      gap: 20px;
      margin: 0 16px 20px;
      color: #4c525c;
      font-size: 17px;
      white-space: nowrap;
    }

    .info-tabs .active {
      color: #2f86ff;
      font-weight: 850;
      font-size: 20px;
      position: relative;
    }

    .info-tabs .active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -4px;
      height: 3px;
      border-radius: 999px;
      background: #2f86ff;
    }

    .news-list {
      display: grid;
      gap: 14px;
      margin: 0 16px;
      padding-bottom: 12px;
    }

    .news-card {
      min-height: 132px;
      border-radius: 16px;
      background: #fff;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 12px;
      padding: 22px 0 18px 20px;
      overflow: hidden;
      box-shadow: 0 8px 22px rgba(38, 72, 122, .04);
      transition: transform .22s ease, box-shadow .22s ease;
      border: 1px solid rgba(230, 234, 242, .6);
    }

    .news-card:active {
      transform: scale(.992);
      box-shadow: 0 5px 18px rgba(38, 72, 122, .035);
    }

    .news-title {
      color: #20242c;
      font-size: 20px;
      line-height: 1.35;
      font-weight: 760;
    }

    .news-date {
      margin-top: 34px;
      color: #b6bbc4;
      font-size: 17px;
    }

    .news-art {
      margin: 4px 0 0;
      border-radius: 18px 0 0 18px;
      background:
        radial-gradient(circle at 68% 34%, #4a8cff 0 17%, transparent 18%),
        linear-gradient(135deg, #fce4df, #e7f0ff 54%, #cfe1ff);
      position: relative;
      min-height: 96px;
    }

    .news-art::before {
      content: "税";
      position: absolute;
      left: 48px;
      top: 28px;
      color: #4d8df8;
      font-size: 38px;
      font-weight: 900;
      opacity: .82;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(var(--nav-h) + var(--safe-bottom));
      z-index: 120;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .22s ease, visibility 0s linear .22s;
    }

    .bottom-nav .nav-inner {
      position: absolute;
      left: 50%;
      bottom: calc(8px + var(--safe-bottom));
      transform: translateX(-50%);
      width: min(calc(100vw - 36px), 404px);
      height: var(--nav-h);
      border-radius: 38px;
      background: url("assets/bottom-nav-fixed-reference.png") center / 100% 100% no-repeat;
      box-shadow: 0 8px 32px rgba(47, 92, 160, .15);
    }

    body.nav-visible .bottom-nav {
      opacity: .92;
      visibility: visible;
      pointer-events: auto;
      transition-delay: 0s;
    }

    .forward-loader {
      position: absolute;
      left: 50%;
      top: clamp(382px, 44vh, 414px);
      width: 136px;
      height: 112px;
      border-radius: 16px;
      background: rgba(74, 82, 92, .75);
      box-shadow: 0 10px 30px rgba(23, 31, 42, .18);
      display: grid;
      place-items: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(-50%) scale(.95);
      transition: opacity .14s ease, transform .18s cubic-bezier(.2, .8, .2, 1), visibility 0s linear .14s;
      z-index: 82;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .forward-loader.open {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) scale(1);
      transition-delay: 0s;
    }

    .loader-spinner {
      width: 42px;
      height: 42px;
      position: relative;
      display: block;
    }

    .loader-spinner i {
      position: absolute;
      left: 19px;
      top: 1px;
      width: 4px;
      height: 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .95);
      opacity: .2;
      transform-origin: 2px 20px;
      animation: loader-bar 1s linear infinite;
    }

    .loader-spinner i:nth-child(1) { transform: rotate(0deg); animation-delay: -0.916s; }
    .loader-spinner i:nth-child(2) { transform: rotate(30deg); animation-delay: -0.833s; }
    .loader-spinner i:nth-child(3) { transform: rotate(60deg); animation-delay: -0.750s; }
    .loader-spinner i:nth-child(4) { transform: rotate(90deg); animation-delay: -0.666s; }
    .loader-spinner i:nth-child(5) { transform: rotate(120deg); animation-delay: -0.583s; }
    .loader-spinner i:nth-child(6) { transform: rotate(150deg); animation-delay: -0.500s; }
    .loader-spinner i:nth-child(7) { transform: rotate(180deg); animation-delay: -0.416s; }
    .loader-spinner i:nth-child(8) { transform: rotate(210deg); animation-delay: -0.333s; }
    .loader-spinner i:nth-child(9) { transform: rotate(240deg); animation-delay: -0.250s; }
    .loader-spinner i:nth-child(10) { transform: rotate(270deg); animation-delay: -0.166s; }
    .loader-spinner i:nth-child(11) { transform: rotate(300deg); animation-delay: -0.083s; }
    .loader-spinner i:nth-child(12) { transform: rotate(330deg); animation-delay: 0s; }

    @keyframes loader-bar {
      0% { opacity: .95; }
      100% { opacity: .18; }
    }

    .sub-page {
      background: var(--page);
    }

    #detail {
      background: #fff;
    }
    /* 明细页改为独立滚动：header + 灰色条 + 汇总固定，记录列表滚动 */
    #detail.screen.scroll {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #detail .sub-header,
    #detail .detail-transition,
    #detail .summary {
      flex: 0 0 auto;
      position: relative;
      z-index: 2;
    }
    #detail .detail-transition {
      height: 10px;
    }

    #recordList {
      background: #fff;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding-bottom: max(12px, var(--safe-bottom));
      position: relative;
      z-index: 1;
    }

    .sub-header {
      min-height: calc(61px + var(--safe-top));
      background: #fff;
      display: grid;
      grid-template-columns: 96px 1fr 96px;
      align-items: center;
      padding: var(--safe-top) 18px 0;
      border-bottom: 1px solid #e7eaf0;
      flex: 0 0 auto;
      position: sticky;
      top: 0;
      z-index: 10;
      transition: padding .2s ease;
    }

    .back {
      justify-self: start;
      color: var(--blue);
      font-size: 17px;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
    }

    .back::before {
      content: "";
      width: 14px;
      height: 14px;
      border-left: 3px solid currentColor;
      border-bottom: 3px solid currentColor;
      transform: rotate(45deg);
    }

    .sub-title {
      text-align: center;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: .02em;
    }

    .header-link {
      justify-self: end;
      color: var(--blue);
      font-size: 17px;
      white-space: nowrap;
    }

    .query-block {
      background: #fff;
      margin-top: 10px;
      box-shadow: 0 1px 0 rgba(230, 234, 242, .9);
    }

    .query-heading {
      height: 58px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      font-size: 19.5px;
      font-weight: 840;
      border-bottom: 1px solid var(--line);
    }

    .query-heading::before {
      content: "";
      width: 5px;
      height: 22px;
      border-radius: 999px;
      background: var(--blue);
      flex: 0 0 auto;
    }

    .row {
      width: 100%;
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      font-size: 20.5px;
      background: #fff;
      color: inherit;
      text-align: left;
      transition: background .12s ease;
    }

    .row:active,
    .type-row:active {
      background: #f3f8ff;
    }

    .row .label {
      color: #5b6270;
    }

    .row .value {
      color: #2d3036;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chevron {
      width: 14px;
      height: 14px;
      border-top: 3px solid #cbd0d9;
      border-right: 3px solid #cbd0d9;
      transform: rotate(45deg);
    }

    .type-row {
      height: 66px;
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      border-bottom: 1px solid var(--line);
      font-size: 20.5px;
      background: #fff;
      transition: background .12s ease;
    }

    .type-row:active {
      background: #f3f8ff;
    }

    .check {
      width: 29px;
      height: 29px;
      border-radius: 50%;
      background: var(--blue);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }

    .check::before {
      content: "";
      width: 13px;
      height: 7px;
      border-left: 2px solid #fff;
      border-bottom: 2px solid #fff;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .more-type {
      height: 64px;
      background: #fff;
      color: var(--blue);
      font-size: 18.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .down {
      width: 16px;
      height: 16px;
      border-right: 3px solid currentColor;
      border-bottom: 3px solid currentColor;
      transform: rotate(45deg) translateY(-4px);
    }

    .query-footer {
      padding: 39px 22px max(22px, var(--safe-bottom));
    }

    .wide-button {
      width: 100%;
      height: 57px;
      border-radius: 14px;
      background: var(--blue);
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      box-shadow: none;
      letter-spacing: .03em;
    }

    .wide-button:active {
      filter: brightness(.92);
      transform: scale(.985);
    }

    .summary {
      background: #fff;
      padding: 20px 20px 18px;
      margin-top: 9px;
      border-bottom: 1px solid #f0f2f6;
    }

    .detail-transition {
      flex: 0 0 10px;
      height: 10px;
      background: var(--page);
      border-top: 1px solid #eef1f6;
      border-bottom: 1px solid #f0f2f6;
    }

    #detail .summary {
      margin-top: 0;
    }

    .summary-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      min-height: 36px;
      font-size: 21px;
      line-height: 1.2;
    }

    .summary-row + .summary-row {
      margin-top: 12px;
      padding-top: 13px;
      border-top: 1px solid var(--line);
    }

    .summary-value {
      font-weight: 600;
    }

    .question {
      display: inline-grid;
      place-items: center;
      width: 17px;
      height: 17px;
      border: 1.5px solid var(--blue);
      color: var(--blue);
      border-radius: 50%;
      font-size: 12px;
      margin-left: 3px;
      vertical-align: 2px;
    }

    .record {
      background: #fff;
      padding: 28px 20px 24px;
      min-height: 190px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto 18px;
      gap: 10px;
      border-top: 10px solid var(--page);
      overflow: hidden;
    }

    .record-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 18px;
      grid-column: 1 / 3;
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 16px;
    }

    .record-date {
      white-space: nowrap;
      font-weight: 470;
    }

    .record-lines {
      grid-column: 1 / 3;
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .record-line {
      color: #9ca3ae;
      font-size: 18px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .record-arrow {
      grid-column: 3;
      grid-row: 1 / 3;
      align-self: center;
      width: 16px;
      height: 16px;
      border-top: 3px solid #d1d4db;
      border-right: 3px solid #d1d4db;
      transform: rotate(45deg);
    }

    .sheet-layer,
    .admin-layer {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      background: rgba(0, 0, 0, .48);
      z-index: 90;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity .26s ease,
        visibility 0s linear .26s;
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .sheet-layer.open,
    .admin-layer.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition-delay: 0s;
    }

    .year-sheet {
      width: 100%;
      min-height: calc(382px + var(--safe-bottom));
      background: #fff;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      padding-bottom: calc(var(--safe-bottom) + 4px);
      transform: translate3d(0, 24px, 0);
      transition: transform .28s cubic-bezier(.2, .8, .2, 1);
      box-shadow: 0 -18px 50px rgba(12, 28, 50, .16);
    }

    .sheet-layer.open .year-sheet {
      transform: translate3d(0, 0, 0);
    }

    .sheet-head {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid #e1e4ea;
      font-size: 18px;
    }

    .sheet-head button {
      color: var(--blue);
      font-size: 18px;
    }

    .sheet-head button:first-child {
      color: #4c5562;
    }

    .year-wheel {
      position: relative;
      height: 324px;
      background: #fff;
      overflow: hidden;
    }

    .year-wheel::before,
    .year-wheel::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      height: 1px;
      background: #e3e6ec;
      z-index: 2;
      pointer-events: none;
    }

    .year-wheel::before {
      top: calc(50% - 25px);
    }

    .year-wheel::after {
      top: calc(50% + 25px);
    }

    .year-options {
      height: 100%;
      overflow-y: auto;
      padding: 137px 0;
      background: #fff;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    .year-options::-webkit-scrollbar {
      display: none;
    }

    .year-option {
      width: 100%;
      height: 50px;
      display: grid;
      place-items: center;
      color: #d3d7df;
      font-size: 24px;
      scroll-snap-align: center;
    }

    .year-option.selected {
      color: #202631;
      font-size: 25px;
      font-weight: 500;
    }

    #detail .summary-row {
      font-size: 20px;
    }

    #detail .record-head {
      font-size: 21px;
    }

    #detail .record-line {
      font-size: 17px;
    }

    .admin-panel {
      width: 100%;
      max-height: 88%;
      background: #fff;
      border-radius: 20px 20px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -22px 50px rgba(0, 0, 0, .18);
      transform: translate3d(0, 28px, 0);
      transition: transform .30s cubic-bezier(.2, .8, .2, 1);
      padding-bottom: var(--safe-bottom);
    }

    .admin-layer.open .admin-panel {
      transform: translate3d(0, 0, 0);
    }

    .admin-head {
      height: 58px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 0 18px;
      border-bottom: 1px solid #eef1f6;
    }

    .admin-head h2 {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
    }

    .text-button {
      color: var(--blue);
      font-size: 15px;
      white-space: nowrap;
      font-weight: 500;
    }

    .admin-body {
      overflow: auto;
      padding: 16px 16px 24px;
      background: #f5f8fc;
    }

    .admin-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }

    .admin-tab {
      height: 36px;
      border-radius: 10px;
      background: #eaf0f8;
      color: #4d5969;
      font-size: 14px;
      font-weight: 500;
      transition: all .16s ease;
    }

    .admin-tab:active {
      transform: scale(.96);
    }

    .admin-tab.active {
      background: var(--blue);
      color: #fff;
      font-weight: 700;
    }

    .admin-section {
      display: none;
      gap: 12px;
    }

    .admin-section.active {
      display: grid;
    }

    .form-card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: 0 1px 3px rgba(0, 0, 0, .02);
    }

    .form-card h3 {
      font-size: 15px;
      color: #202631;
      font-weight: 700;
    }

    .field {
      display: grid;
      gap: 5px;
      font-size: 13px;
      color: #687182;
    }

    .field input,
    .field textarea {
      width: 100%;
      min-height: 42px;
      border: 1.5px solid #dde3ec;
      border-radius: 10px;
      padding: 10px 12px;
      color: #202631;
      background: #fff;
      outline: none;
      font-size: 15px;
      transition: border-color .18s ease, box-shadow .18s ease;
    }

    .field textarea {
      min-height: 72px;
      resize: vertical;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(47, 134, 255, .12);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-button {
      min-height: 38px;
      border-radius: 10px;
      background: #eaf2ff;
      color: var(--blue);
      font-size: 14px;
      font-weight: 700;
      transition: all .16s ease;
    }

    .mini-button:active {
      transform: scale(.97);
    }

    .mini-button.danger {
      background: #fff0f0;
      color: #d93636;
    }

    .record-editor {
      border: 1.5px solid #e7ecf4;
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      display: grid;
      gap: 12px;
    }

    .record-editor-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: #202631;
      font-weight: 800;
      font-size: 15px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 14px;
      color: #202631;
      padding: 4px 0;
    }

    .switch-row input {
      width: 44px;
      height: 26px;
      accent-color: var(--blue);
      cursor: pointer;
    }

    .admin-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .json-box {
      min-height: 130px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 430px) {
      .app {
        width: 100vw;
        height: var(--real-vh, 100dvh);
        min-height: -webkit-fill-available;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="app-stage">
    <main class="app" aria-label="个人所得税 App">
      <section id="splash" class="screen splash active" aria-label="启动过渡页"></section>

      <section id="home" class="screen home scroll" aria-label="首页">
        <div class="home-top">

        <section class="info-tabs" aria-label="资讯分类">
          <span class="active">警示案例</span>

        </section>

        <section class="news-list" aria-label="资讯列表">
          <article class="news-card">

            <div class="news-art"></div>
          </article>
          <article class="news-card">
            <div>
              <div class="news-title">获取退税想及时 准确卡号必须有</div>

      <section id="query" class="screen sub-page" aria-label="收入纳税明细查询">

          <div class="sub-title" data-bind="detailTitle">收入纳税明细</div>

        </header>

        <div class="query-block">
          <div class="query-heading">请选择纳税年度</div>

      <div id="forwardLoader" class="forward-loader" aria-hidden="true">

      <aside id="yearLayer" class="sheet-layer" aria-label="选择年份">

          <div class="year-wheel"><div id="yearOptions" class="year-options"></div></div>

<script>
  // iOS 全屏适配：设置 --real-vh 为实际视口高度 + 检测 standalone 模式
  (() => {
    const metaTheme = document.querySelector('meta[name="theme-color"]');

    const setViewportHeight = () => {
      const isStandalone = !!(
        window.navigator.standalone ||
        window.matchMedia?.('(display-mode: fullscreen)').matches ||
        window.matchMedia?.('(display-mode: standalone)').matches ||
        new URLSearchParams(location.search).get('preview') === 'standalone'
      );
      document.documentElement.classList.toggle('is-standalone', isStandalone);
      const isIOS = document.documentElement.classList.contains('ios-device');
      const isPreviewStandalone = new URLSearchParams(location.search).get('preview') === 'standalone';
      document.documentElement.classList.toggle('ios-standalone', isStandalone && (isIOS || isPreviewStandalone));

      // 取当前实际视口高度
      const h = Math.max(
        window.innerHeight || 0,
        window.visualViewport?.height || 0,
        document.documentElement.clientHeight || 0
      );
      if (h > 0) {
        document.documentElement.style.setProperty('--real-vh', `${Math.ceil(h)}px`);
      }

      // standalone 模式下根据当前页面切换状态栏背景色
      if (isStandalone && metaTheme) {
        const isHome = document.querySelector('#home.active');
        metaTheme.content = isHome ? '#2f86ff' : '#ffffff';
      }
    };

    setViewportHeight();
    window.addEventListener('resize', setViewportHeight, { passive: true });
    window.addEventListener('orientationchange', () => setTimeout(setViewportHeight, 240), { passive: true });
    window.visualViewport?.addEventListener('resize', setViewportHeight, { passive: true });
  })();
</script>

<script>
  /* ===== Service Worker 注册（离线 PWA 支持） ===== */
  (() => {
    if (!('serviceWorker' in navigator)) return;
    if (location.pathname === '/phone-preview.html') return;

    const registerSW = async () => {
      try {
        const registration = await navigator.serviceWorker.register('./sw.js', { scope: './' });
        console.log('[PWA] Service Worker 已注册');

        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateToast();
            }
          });
        });
      } catch (err) {
        console.warn('[PWA] Service Worker 注册失败:', err);
      }
    };

    if (document.readyState === 'complete') registerSW();
    else window.addEventListener('load', registerSW);

    function showUpdateToast() {
      const toast = document.createElement('div');
      toast.id = 'sw-update-toast';
      toast.style.cssText = [
        'position:fixed;bottom:100px;left:50%;transform:translateX(-50%)',
        'background:rgba(0,0,0,.78);color:#fff;padding:12px 22px',
        'border-radius:12px;font-size:15px;z-index:999',
        'display:flex;align-items:center;gap:14px',
        'backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)',
        'animation:toast-in .3s ease',
      ].join(';');
      toast.innerHTML = '<span>新版本已缓存，离线也可使用</span><button style="background:#2f86ff;color:#fff;border:0;border-radius:8px;padding:7px 16px;font-size:14px;font-weight:600;cursor:pointer">刷新</button>';
      toast.querySelector('button').addEventListener('click', () => { toast.remove(); location.reload(); });
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 10000);
    }

    const s = document.createElement('style');
    s.textContent = '@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(s);
  })();
</script>
