<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>手机预览 · 个人所得税</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #141418;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      padding: 16px;
    }

    .toolbar {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 20;
    }

    .toolbar button {
      background: rgba(255, 255, 255, 0.08);
      color: #e8e8ed;
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .toolbar button:hover { background: rgba(255, 255, 255, 0.14); }
    .toolbar button.is-on {
      background: rgba(47, 134, 255, 0.25);
      border-color: rgba(47, 134, 255, 0.5);
      color: #fff;
    }

    .phone {
      --phone-w: 390px;
      --phone-h: 844px;
      width: var(--phone-w);
      height: var(--phone-h);
      background: linear-gradient(145deg, #2a2a30, #111114);
      border-radius: 54px;
      padding: 11px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 30px 80px rgba(0, 0, 0, 0.55),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      position: relative;
      flex-shrink: 0;
      transform-origin: center center;
    }

    .btn-side {
      position: absolute;
      background: #1e1e22;
      border-radius: 2px;
    }

    .btn-side.power { right: -3px; top: 168px; width: 3px; height: 88px; }
    .btn-side.vol-up { left: -3px; top: 140px; width: 3px; height: 52px; }
    .btn-side.vol-down { left: -3px; top: 204px; width: 3px; height: 52px; }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 44px;
      overflow: hidden;
      background: #000;
      position: relative;
    }

    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 37px;
      background: #000;
      border-radius: 22px;
      z-index: 5;
      pointer-events: none;
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: rgba(255, 255, 255, 0.28);
      border-radius: 99px;
      z-index: 5;
      pointer-events: none;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #f5f7fb;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.38);
      font-size: 11px;
      white-space: nowrap;
    }

    @media (max-height: 920px) { .phone { transform: scale(0.88); } }
    @media (max-height: 800px) { .phone { transform: scale(0.76); } }
    @media (max-height: 680px) { .phone { transform: scale(0.64); } }
  </style>
</head>
<body>
  <div class="toolbar">
    <button type="button" id="reload">刷新</button>
    <button type="button" id="toggle-standalone" class="is-on">主屏幕模式</button>
  </div>

  <div class="phone" aria-label="iPhone 预览框">
    <div class="btn-side power"></div>
    <div class="btn-side vol-up"></div>
    <div class="btn-side vol-down"></div>
    <div class="phone-screen">
      <div class="dynamic-island"></div>
      <iframe id="app" title="个人所得税 App"></iframe>
      <div class="home-indicator"></div>
    </div>
  </div>

  <p class="hint">iPhone 14 · 390×844 · 保存代码后自动刷新</p>

  <script>
    const iframe = document.getElementById('app');
    const reloadBtn = document.getElementById('reload');
    const standaloneBtn = document.getElementById('toggle-standalone');
    let standalone = true;

    function appUrl() {
      const params = new URLSearchParams();
      if (standalone) params.set('preview', 'standalone');
      params.set('_t', String(Date.now()));
      return '/index.html?' + params.toString();
    }

    function loadApp() {
      iframe.src = appUrl();
    }

    reloadBtn.addEventListener('click', loadApp);
    standaloneBtn.addEventListener('click', () => {
      standalone = !standalone;
      standaloneBtn.classList.toggle('is-on', standalone);
      standaloneBtn.textContent = standalone ? '主屏幕模式' : '浏览器模式';
      loadApp();
    });

    loadApp();

    if (/^(127\.0\.0\.1|localhost)$/.test(location.hostname)) {
      const es = new EventSource('/__livereload__');
      es.onmessage = () => loadApp();
      es.onerror = () => es.close();
    }
  </script>
</body>
</html>
