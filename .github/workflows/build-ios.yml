# =============================================================================
# 个人所得税 — iOS .ipa 构建工作流
# =============================================================================

name: 📱 Build iOS .ipa

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建 iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 安装 npm 依赖
        run: npm install

      - name: 🔄 同步 Web 资源到 iOS 项目
        run: npx cap sync ios

      - name: ⬇️ 手动安装 Capacitor xcframework
        run: |
          # 创建 SPM 工件目录
          DERIVED_DATA="$HOME/Library/Developer/Xcode/DerivedData"
          mkdir -p "$DERIVED_DATA"

          # 手动下载并解压 Capacitor xcframework
          cd /tmp
          for FRAMEWORK in Capacitor Cordova; do
            echo "📥 下载 $FRAMEWORK.xcframework..."
            curl -fL -o "$FRAMEWORK.zip" \
              "https://github.com/ionic-team/capacitor-swift-pm/releases/download/8.4.0/${FRAMEWORK}.xcframework.zip" 2>&1
            if [ -f "$FRAMEWORK.zip" ]; then
              echo "✅ 下载成功: $(ls -lh $FRAMEWORK.zip | awk '{print $5}')"
              unzip -q -o "$FRAMEWORK.zip"
              echo "  解压完成"
            else
              echo "⚠️ 下载失败，尝试另一种方式..."
            fi
          done
          ls -la /tmp/*.xcframework/ 2>/dev/null || echo "xcframework 目录未找到"

      - name: 🏗️ 构建 .xcarchive
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
        run: |
          export XCODE_APPLE_ID="$APPLE_ID"
          export XCODE_APPLE_ID_PASSWORD="$APPLE_ID_PASS"

          # 清除 SPM 解析缓存
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData/App-*/SourcePackages
          rm -rf ~/Library/Developer/Xcode/DerivedData/App-*/Build

          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY="iPhone Developer" \
            DEVELOPMENT_TEAM="" || true

          # 如果上面的 archive 失败，尝试无签名构建
          if [ ! -d "${{ runner.temp }}/TaxApp.xcarchive" ]; then
            echo "⚠️ 签名构建失败，尝试无签名构建..."
            xcodebuild archive \
              -project App.xcodeproj \
              -scheme App \
              -configuration Release \
              -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGN_STYLE=Manual
          fi

      - name: 📱 导出/打包 .ipa
        run: |
          # 尝试正常导出
          mkdir -p ${{ runner.temp }}/ipa
          cat <<'PLIST' > ${{ runner.temp }}/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist ${{ runner.temp }}/exportOptions.plist \
            -allowProvisioningUpdates 2>&1 || echo "⚠️ 导出失败，尝试手动打包"

          # 手动打包兜底
          if [ ! -f "${{ runner.temp }}/ipa/"*.ipa ]; then
            echo "📦 手动打包..."
            APP_PATH=$(find "${{ runner.temp }}/TaxApp.xcarchive" -name "*.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p ${{ runner.temp }}/ipa/Payload
              cp -R "$APP_PATH" ${{ runner.temp }}/ipa/Payload/
              cd ${{ runner.temp }}/ipa
              zip -r TaxApp.ipa Payload/
              echo "✅ 手动打包完成"
            fi
          fi

      - name: 📤 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TaxApp-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: warn
          retention-days: 30
