# =============================================================================
# 个人所得税 — iOS .ipa 构建工作流
# =============================================================================
# 说明：
#   在 GitHub 免费 macOS runner 上编译 .ipa 安装包。
#   不签名构建，生成 development .ipa 可用 Sideloadly/AltStore 侧载。
# =============================================================================

name: 📱 Build iOS .ipa

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建 iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 📦 安装 npm 依赖
        run: npm install

      - name: 🔄 同步 Web 资源到 iOS 项目
        run: npx cap sync ios

      - name: 🏗️ 构建 .xcarchive（无签名）
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual

      - name: 📱 导出 .ipa（无签名）
        run: |
          # 创建 exportOptions.plist
          cat <<'PLIST' > ${{ runner.temp }}/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>-</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string></string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist ${{ runner.temp }}/exportOptions.plist \
            -allowProvisioningUpdates \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual || true

          # 如果上面的命令没有产生 .ipa，手动从 .xcarchive 打包
          if [ ! -f "${{ runner.temp }}/ipa/"*.ipa ]; then
            echo "⚠️ xcodebuild -exportArchive 未生成 .ipa，尝试手动打包..."
            mkdir -p "${{ runner.temp }}/ipa"
            # 创建一个 Payload 目录
            PAYLOAD="${{ runner.temp }}/ipa/Payload"
            mkdir -p "$PAYLOAD"
            # 从 .xcarchive 复制 .app
            cp -R "${{ runner.temp }}/TaxApp.xcarchive/Products/Applications/"*.app "$PAYLOAD/" 2>/dev/null || true
            if [ -d "$PAYLOAD/"*.app ]; then
              cd "${{ runner.temp }}/ipa"
              zip -r TaxApp.ipa Payload/
              echo "✅ 手动打包成功"
            fi
          fi

      - name: 📤 上传 .ipa 产物
        uses: actions/upload-artifact@v4
        with:
          name: TaxApp-iOS
          path: |
            ${{ runner.temp }}/ipa/*.ipa
            ${{ runner.temp }}/ipa/Payload/
          if-no-files-found: warn
          retention-days: 30

      - name: 📋 构建摘要
        run: |
          echo "## ✅ iOS 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下载 .ipa" >> $GITHUB_STEP_SUMMARY
          echo "打开本页底部的 **Artifacts** 区域，下载 TaxApp-iOS.zip" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 安装方式" >> $GITHUB_STEP_SUMMARY
          echo "1. 下载 **Sideloadly** (https://sideloadly.io)" >> $GITHUB_STEP_SUMMARY
          echo "2. iPhone 连电脑，拖入 .ipa，输入 Apple ID" >> $GITHUB_STEP_SUMMARY
          echo "3. 或使用 **AltStore** / **爱思助手** 安装" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh "${{ runner.temp }}/ipa/" 2>/dev/null || echo "⚠️ 无 .ipa 文件" >> $GITHUB_STEP_SUMMARY
