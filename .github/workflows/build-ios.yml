# =============================================================================
# 个人所得税 — iOS .ipa 构建工作流
# =============================================================================
# 说明：
#   在 GitHub 免费 macOS runner 上编译 .ipa 安装包。
#   使用自签名证书签名，爱思助手 / Sideloadly 均可安装。
# =============================================================================

name: 📱 Build iOS .ipa

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建 iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: ✅ 确认 Node 版本
        run: node --version && npm --version

      - name: 📦 安装 npm 依赖
        run: npm install

      - name: 🔄 同步 Web 资源到 iOS 项目
        run: npx cap sync ios

      - name: 🏗️ 构建 .xcarchive
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual

      - name: 🔑 创建自签名证书并签名 .app
        run: |
          # 1. 创建自签名证书
          KEYCHAIN_PASSWORD="TempPass123"
          KEYCHAIN_PATH="${{ runner.temp }}/ios-build.keychain"

          # 创建 Keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 生成自签名"iPhone Developer"证书
          cat > /tmp/ssl.conf << 'EOF'
          [req]
          distinguished_name = req_distinguished_name
          x509_extensions = v3_req
          prompt = no
          [req_distinguished_name]
          CN = iPhone Developer: Temporary
          [v3_req]
          keyUsage = keyEncipherment, digitalSignature
          extendedKeyUsage = codeSigning
          EOF

          openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
            -keyout /tmp/ios.key -out /tmp/ios.crt \
            -config /tmp/ssl.conf

          # 导入证书到 Keychain
          security import /tmp/ios.crt -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PATH" "$KEYCHAIN_PATH"

          # 设置 Keychain 为默认
          security default-keychain -s "$KEYCHAIN_PATH"

          # 2. 从 .xcarchive 中取出 .app
          APP_PATH=$(find "${{ runner.temp }}/TaxApp.xcarchive" -name "*.app" -type d | head -1)
          echo "找到 .app: $APP_PATH"

          # 3. 获取 entitlements
          ENTITLEMENTS="${{ runner.temp }}/entitlements.plist"
          cat > "$ENTITLEMENTS" << 'EOL'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>keychain-access-groups</key>
            <array>
              <string>$(AppIdentifierPrefix)com.personal.taxcalculator</string>
            </array>
            <key>get-task-allow</key>
            <true/>
            <key>application-identifier</key>
            <string>$(AppIdentifierPrefix)com.personal.taxcalculator</string>
            <key>com.apple.developer.team-identifier</key>
            <string></string>
          </dict>
          </plist>
          EOL

          # 4. 用自签名证书签名
          codesign -f -s "iPhone Developer: Temporary" \
            --entitlements "$ENTITLEMENTS" \
            --deep \
            "$APP_PATH"

          echo "✅ 签名完成"
          codesign -dv "$APP_PATH" 2>&1 || true

      - name: 📱 打包 .ipa
        run: |
          # 从 .xcarchive 复制签好名的 .app
          APP_PATH=$(find "${{ runner.temp }}/TaxApp.xcarchive" -name "*.app" -type d | head -1)

          mkdir -p "${{ runner.temp }}/ipa/Payload"
          cp -R "$APP_PATH" "${{ runner.temp }}/ipa/Payload/"

          cd "${{ runner.temp }}/ipa"
          zip -r TaxApp.ipa Payload/
          echo "✅ .ipa 打包完成"
          ls -lh TaxApp.ipa

      - name: 📤 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TaxApp-iOS
          path: ${{ runner.temp }}/ipa/TaxApp.ipa
          if-no-files-found: error
          retention-days: 30

      - name: 📋 构建摘要
        run: |
          echo "## ✅ iOS 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下载 .ipa" >> $GITHUB_STEP_SUMMARY
          echo "打开本页底部的 **Artifacts** 区域，下载 TaxApp-iOS.zip" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 安装方式" >> $GITHUB_STEP_SUMMARY
          echo "1. 解压得到 .ipa" >> $GITHUB_STEP_SUMMARY
          echo "2. 爱思助手 → 应用游戏 → 导入安装" >> $GITHUB_STEP_SUMMARY
          echo "3. 或 Sideloadly → 拖入 .ipa → 输入 Apple ID → Start" >> $GITHUB_STEP_SUMMARY
