# =============================================================================
# 个人所得税 — iOS .ipa 构建工作流
# =============================================================================
# 说明：
#   在 GitHub 免费 macOS runner 上编译 .ipa 安装包。
#   每次推送到 main 分支或手动触发时运行。
#
# 准备工作（仅首次需要）：
#   1. 注册 Apple Developer 账号（免费也可）
#   2. 生成 iOS 签名证书并导出为 .p12
#   3. 将证书上传到 GitHub Secrets：
#      Settings → Secrets and variables → Actions → New repository secret
#      - BUILD_CERTIFICATE_BASE64: 证书 .p12 的 base64（openssl base64 -in cert.p12）
#      - BUILD_CERTIFICATE_PASSWORD: 证书密码
#      - BUILD_PROVISION_PROFILE_BASE64: 描述文件 .mobileprovision 的 base64
#      - KEYCHAIN_PASSWORD: 随便设一个临时密码（签完自动销毁）
#      - TEAM_ID: 你的 Apple Team ID
#
#   4. 如果是免费账号，也可不用上述 secrets，export 时会用 development 签名
# =============================================================================

name: 📱 Build iOS .ipa

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建模式'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - release
      sign_type:
        description: '签名方式'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto      # 用 secrets 中的证书签名
          - unsigned  # 不签名（仅调试用）

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建 iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 安装 npm 依赖
        run: npm ci

      - name: 🔄 同步 Web 资源到 iOS 项目
        run: npx cap sync ios

      - name: 🏗️ 构建 iOS App（xcarchive）
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=${{ secrets.TEAM_ID || '' }}

      - name: 📱 导出 .ipa
        run: |
          EXPORT_OPTIONS_PLIST="${{ runner.temp }}/exportOptions.plist"

          if [[ "${{ github.event.inputs.sign_type }}" == "unsigned" ]]; then
            # 不签名导出（仅用于调试）
            /usr/libexec/PlistBuddy -c "Add method string development" "$EXPORT_OPTIONS_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set method development" "$EXPORT_OPTIONS_PLIST"
            /usr/libexec/PlistBuddy -c "Add signingStyle string manual" "$EXPORT_OPTIONS_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set signingStyle manual" "$EXPORT_OPTIONS_PLIST"
          else
            # 正常签名导出
            /usr/libexec/PlistBuddy -c "Add method string development" "$EXPORT_OPTIONS_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set method development" "$EXPORT_OPTIONS_PLIST"
            /usr/libexec/PlistBuddy -c "Add signingStyle string automatic" "$EXPORT_OPTIONS_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set signingStyle automatic" "$EXPORT_OPTIONS_PLIST"
            /usr/libexec/PlistBuddy -c "Add teamID string ${{ secrets.TEAM_ID || '' }}" "$EXPORT_OPTIONS_PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set teamID ${{ secrets.TEAM_ID || '' }}" "$EXPORT_OPTIONS_PLIST" || true
          fi

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST" \
            -allowProvisioningUpdates

      - name: 📤 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TaxApp-iOS-${{ github.sha }}
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: 📋 摘要
        run: |
          echo "## ✅ iOS 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh "${{ runner.temp }}/ipa/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "下载 .ipa：打开本页底部的 Artifacts 区域，点击 TaxApp-iOS-xxx 下载。" >> $GITHUB_STEP_SUMMARY
