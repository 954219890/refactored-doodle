# =============================================================================
# 个人所得税 — iOS .ipa 构建工作流
# =============================================================================
# 说明：
#   在 GitHub 免费 macOS runner 上编译 .ipa 安装包。
#   用你的 Apple ID 自动签名，可直接用爱思助手安装。
#
# 所需 GitHub Secrets：
#   APPLE_ID      - 你的 Apple ID 邮箱
#   APPLE_ID_PASS - Apple ID 专用密码（https://appleid.apple.com/account/manage）
# =============================================================================

name: 📱 Build iOS .ipa

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 📦 构建 iOS .ipa
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: ⬇️ 检出代码
        uses: actions/checkout@v4

      - name: 🔧 设置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 安装 npm 依赖
        run: npm install

      - name: 🔄 同步 Web 资源到 iOS 项目
        run: npx cap sync ios

      - name: 🏗️ 构建 .xcarchive（Apple ID 签名）
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
        run: |
          # 清理 SPM 缓存（防止二进制包损坏）
          rm -rf ~/Library/Caches/org.swift.swiftpm
          rm -rf ~/Library/Developer/Xcode/DerivedData

          # 设置 Apple ID 凭据供 xcodebuild 使用
          export XCODE_APPLE_ID="$APPLE_ID"
          export XCODE_APPLE_ID_PASSWORD="$APPLE_ID_PASS"

          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -allowProvisioningUpdates \
            -disablePackageRepositoryCache \
            CODE_SIGN_STYLE=Automatic

      - name: 📱 导出 .ipa
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASS: ${{ secrets.APPLE_ID_PASS }}
        run: |
          export XCODE_APPLE_ID="$APPLE_ID"
          export XCODE_APPLE_ID_PASSWORD="$APPLE_ID_PASS"

          # 创建 exportOptions.plist
          cat <<'PLIST' > ${{ runner.temp }}/exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath ${{ runner.temp }}/TaxApp.xcarchive \
            -exportPath ${{ runner.temp }}/ipa \
            -exportOptionsPlist ${{ runner.temp }}/exportOptions.plist \
            -allowProvisioningUpdates

      - name: 📤 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: TaxApp-iOS
          path: ${{ runner.temp }}/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30

      - name: 📋 构建摘要
        run: |
          echo "## ✅ iOS 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "打开 **Artifacts** → 下载 TaxApp-iOS.zip → 解压得到 .ipa" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 安装方式" >> $GITHUB_STEP_SUMMARY
          echo "爱思助手 → 应用游戏 → 导入安装" >> $GITHUB_STEP_SUMMARY
